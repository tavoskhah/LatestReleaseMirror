name: Sync latest releases & update README

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

concurrency:
  group: sync-releases
  cancel-in-progress: false

jobs:
  sync-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # -------------------- SYNC RELEASES --------------------
      - name: Sync releases
        run: |
          set -e
          trap 'echo "Error on line $LINENO, exit code $?"' ERR

          # Bring local branch up to date with remote (once, before any changes)
          git pull --rebase origin HEAD

          if [ ! -f repos.txt ]; then
            echo "ERROR: repos.txt not found."
            exit 1
          fi

          # Process each repository – commits are made locally, no pushes yet
          grep -v '^#' repos.txt | grep -v '^[[:space:]]*$' | while IFS='|' read -r repo_path filter_pattern; do
            repo_path=$(echo "$repo_path" | xargs)
            filter_pattern=$(echo "$filter_pattern" | xargs)

            echo "========================================="
            echo "Repo: $repo_path"
            echo "Filter: $filter_pattern"

            owner=$(echo "$repo_path" | cut -d'/' -f1)
            repo_name=$(echo "$repo_path" | cut -d'/' -f2)
            target_dir="releases/$owner/$repo_name"
            mkdir -p "$target_dir"

            # Fetch latest release info
            latest_json=$(curl -s --fail "https://api.github.com/repos/$repo_path/releases/latest")
            if echo "$latest_json" | grep -q '"message": "Not Found"'; then
              echo "  No releases found, skipping."
              continue
            fi

            tag=$(echo "$latest_json" | jq -r '.tag_name')
            prerelease=$(echo "$latest_json" | jq -r '.prerelease')
            date_raw=$(echo "$latest_json" | jq -r '.published_at')
            status="stable"
            [[ "$prerelease" == "true" ]] && status="prerelease"

            # Check current version from .version file (simple, robust)
            current_version=""
            if [ -f "$target_dir/.version" ]; then
              current_version=$(cat "$target_dir/.version")
            fi

            if [ "$current_version" = "$tag" ]; then
              echo "  Already up to date: $tag"
              continue
            fi

            echo "  New release: $tag (previous: $current_version)"
            # Remove old assets but keep .version (it will be overwritten)
            find "$target_dir" -type f ! -name '.version' -delete 2>/dev/null || true

            echo "  Downloading matching assets (skipping >100 MB)..."
            while read -r url; do
              filename=$(basename "$url")
              size=$(curl -sL -I "$url" | grep -i content-length | tail -1 | awk '{print $2}' | tr -d '\r')
              if [ -n "$size" ] && [ "$size" -gt 104857600 ]; then
                echo "    SKIP $filename – $size bytes (>100 MB)"
                continue
              fi
              echo "    Downloading $filename"
              wget -q --show-progress "$url" -P "$target_dir"
            done < <(curl -s "https://api.github.com/repos/$repo_path/releases/tags/$tag" \
              | jq -r --arg pat "$filter_pattern" '.assets[].browser_download_url | select(test($pat; "i"))')

            # Write .version file (simple tag)
            echo "$tag" > "$target_dir/.version"

            # Write release.json for optional metadata
            printf '{\n' > "$target_dir/release.json"
            printf '  "tag": "%s",\n' "$tag" >> "$target_dir/release.json"
            printf '  "status": "%s",\n' "$status" >> "$target_dir/release.json"
            printf '  "published_at": "%s",\n' "$date_raw" >> "$target_dir/release.json"
            printf '  "filter_pattern": "%s",\n' "$filter_pattern" >> "$target_dir/release.json"
            printf '  "updated_at": "%s"\n' "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$target_dir/release.json"
            printf '}\n' >> "$target_dir/release.json"

            git add "$target_dir"
            git commit -m "Update $repo_path to $tag"
            echo "  Committed locally: $repo_path -> $tag"
          done

          # After all repositories, push all commits at once
          git push
          echo "All updates pushed."

      # -------------------- GENERATE tree.md --------------------
      - name: Generate tree.md
        run: |
          git pull --rebase origin HEAD
          cat > generate-tree.sh << 'GENERATOR'
          #!/bin/bash
          set -e
          TREE_FILE="tree.md"
          RELEASES_DIR="releases"
          CURRENT_REPO="Ehs6n/LatestReleaseMirror"
          echo "# Releases Structure" > "$TREE_FILE"
          echo "" >> "$TREE_FILE"
          echo '```' >> "$TREE_FILE"
          find "$RELEASES_DIR" -type f -name ".version" -printf "%h\n" | sort | while read -r repo_dir; do
            asset_count=$(find "$repo_dir" -type f ! -name ".version" ! -name "release.json" | wc -l)
            if [ "$asset_count" -eq 0 ]; then
              continue
            fi
            owner=$(basename "$(dirname "$repo_dir")")
            repo_name=$(basename "$repo_dir")
            original_url="https://github.com/$owner/$repo_name"
            tag=$(cat "$repo_dir/.version")
            echo "├── $owner/$repo_name [$original_url] [$tag]" >> "$TREE_FILE"
            find "$repo_dir" -type f ! -name ".version" ! -name "release.json" -printf "%f\n" | sort | while read -r asset; do
              asset_path="$repo_dir/$asset"
              size_bytes=$(stat -c%s "$asset_path" 2>/dev/null || stat -f%z "$asset_path" 2>/dev/null)
              if [ "$size_bytes" -lt 1048576 ]; then
                size_display="$((size_bytes / 1024)) KB"
              else
                size_mb=$(echo "scale=1; $size_bytes / 1048576" | bc)
                size_display="${size_mb} MB"
              fi
              raw_link="https://raw.githubusercontent.com/$CURRENT_REPO/main/$asset_path"
              echo "│   ├── $asset [Download]($raw_link) - <small>$size_display</small>" >> "$TREE_FILE"
            done
          done
          echo '```' >> "$TREE_FILE"
          GENERATOR
          chmod +x generate-tree.sh
          ./generate-tree.sh
          git add tree.md
          git diff --staged --quiet || git commit -m "Update tree.md"
          git push

      # -------------------- UPDATE README --------------------
      - name: Update README between markers
        run: |
          # Ensure README.md exists and has markers
          if [ ! -f README.md ]; then
            printf '# LatestReleaseMirror\n\n' > README.md
            printf 'Automatically syncs the latest release from multiple GitHub repositories.\n\n' >> README.md
            printf '<!-- RELEASES_START -->\n' >> README.md
            printf '<!-- RELEASES_END -->\n' >> README.md
          fi

          if ! grep -q "<!-- RELEASES_START -->" README.md; then
            printf '\n<!-- RELEASES_START -->\n' >> README.md
            printf '<!-- RELEASES_END -->\n' >> README.md
          fi

          # Generate new release table
          TABLE=$(mktemp)
          first=true
          find releases -type f -name ".version" -printf "%h\n" | sort | while read -r repo_dir; do
            asset_count=$(find "$repo_dir" -type f ! -name ".version" ! -name "release.json" | wc -l)
            [ "$asset_count" -eq 0 ] && continue

            owner=$(basename "$(dirname "$repo_dir")")
            repo=$(basename "$repo_dir")
            tag=$(cat "$repo_dir/.version")
            url="https://github.com/$owner/$repo"
            anchor=$(echo "${owner}--${repo}" | tr '[:upper:]' '[:lower:]')

            if [ "$first" = false ]; then
              echo "" >> "$TABLE"
              echo "---" >> "$TABLE"
              echo "" >> "$TABLE"
            fi
            first=false

            echo "<div id=\"$anchor\"></div>" >> "$TABLE"
            echo "" >> "$TABLE"
            echo "### $owner--$repo" >> "$TABLE"
            echo "" >> "$TABLE"
            echo "🔗 [source]($url) – [<code><small>$tag</small></code>](https://github.com/$owner/$repo/releases/tag/$tag)" >> "$TABLE"
            echo "" >> "$TABLE"
            echo "| File | Size | Download |" >> "$TABLE"
            echo "|------|------|----------|" >> "$TABLE"

            find "$repo_dir" -type f ! -name ".version" ! -name "release.json" -printf "%f\n" | sort | while read -r asset; do
              asset_path="$repo_dir/$asset"
              size=$(stat -c%s "$asset_path" 2>/dev/null || stat -f%z "$asset_path" 2>/dev/null)
              if [ "$size" -lt 1048576 ]; then
                s="$((size/1024)) KB"
              else
                sm=$(echo "scale=1; $size / 1048576" | bc)
                s="${sm} MB"
              fi
              link="https://raw.githubusercontent.com/Ehs6n/LatestReleaseMirror/main/$asset_path"
              echo "| \`$asset\` | $s | [⬇️ Download]($link) |" >> "$TABLE"
            done
          done

          # Replace content between markers using awk
          awk -v start="<!-- RELEASES_START -->" -v end="<!-- RELEASES_END -->" -v new="$(cat "$TABLE")" '
            BEGIN { p=1 }
            $0 == start { print; print new; p=0; next }
            $0 == end { p=1; print; next }
            p==1 { print }
          ' README.md > README.tmp && mv README.tmp README.md

          git add README.md
          git diff --staged --quiet || git commit -m "Update README between markers"
          git push
